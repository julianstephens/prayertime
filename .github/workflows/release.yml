name: Release APK

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-apk:
    name: Build signed APK
    runs-on: ubuntu-latest

    env:
      PRAYERTIME_KEYSTORE_PATH: ${{ runner.temp }}/prayertime-release.jks
      PRAYERTIME_KEYSTORE_PASSWORD: ${{ secrets.PRAYERTIME_KEYSTORE_PASSWORD }}
      PRAYERTIME_KEY_ALIAS: ${{ secrets.PRAYERTIME_KEY_ALIAS }}
      PRAYERTIME_KEY_PASSWORD: ${{ secrets.PRAYERTIME_KEY_PASSWORD }}

    steps:
      - name: Check out release
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.PRAYERTIME_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${KEYSTORE_BASE64}" ]]; then
            echo "PRAYERTIME_KEYSTORE_BASE64 is not configured."
            exit 1
          fi

          printf '%s' "${KEYSTORE_BASE64}" \
            | base64 --decode \
            > "${PRAYERTIME_KEYSTORE_PATH}"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Prepare release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_APK="app/build/outputs/apk/release/app-release.apk"
          RELEASE_APK="prayer-time-${GITHUB_REF_NAME}.apk"
          CHECKSUM_FILE="${RELEASE_APK}.sha256"

          if [[ ! -f "${SOURCE_APK}" ]]; then
            echo "Expected APK not found: ${SOURCE_APK}"
            exit 1
          fi

          cp "${SOURCE_APK}" "${RELEASE_APK}"
          sha256sum "${RELEASE_APK}" > "${CHECKSUM_FILE}"

          echo "apk=${RELEASE_APK}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${CHECKSUM_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.release_files.outputs.apk }}" \
            "${{ steps.release_files.outputs.checksum }}" \
            --clobber